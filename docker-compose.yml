version: '3.8'
services:
  backend1: 
    build: 
      context: .
      dockerfile: setup/Dockerfile
    ports: ["8081:8081"]
    environment: {PORT: "8081", BACKEND_NAME: "backend1"}
  
  backend2: 
    build: 
      context: .
      dockerfile: setup/Dockerfile
    ports: ["8082:8082"]
    environment: {PORT: "8082", BACKEND_NAME: "backend2"}

  lb:
    build: 
      context: .
      dockerfile: cmd/lb/Dockerfile
    ports: ["3030:3030"]
    volumes: ['./test.yaml:/app/test.yaml']
    command: ["./lb", "-config=/app/test.yaml"]
    depends_on: [backend1, backend2]
    

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
      

volumes:
  grafana-storage:
